<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Amine - Administration</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0f0f12; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; color: #e0e0e0; }
    #app { display: flex; height: 100dvh; }

    /* Login */
    #loginContainer {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: #0f0f12;
      z-index: 100;
    }
    .login-box {
      background: #1a1a20;
      border: 1px solid #2a2a32;
      border-radius: 16px;
      padding: 40px 32px;
      width: 340px;
      max-width: 90vw;
      text-align: center;
    }
    .login-box h2 { font-size: 18px; margin: 16px 0 8px; }
    .login-box p { color: #888; font-size: 13px; margin-bottom: 20px; }
    .login-box input {
      width: 100%;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #333;
      background: #26262e;
      color: #e0e0e0;
      font-size: 15px;
      outline: none;
    }
    .login-box input:focus { border-color: #7c3aed; }
    .login-box button {
      width: 100%;
      margin-top: 12px;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: #7c3aed;
      color: #fff;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: 0.15s;
    }
    .login-box button:hover { background: #6d28d9; }
    .login-error { color: #f87171; font-size: 13px; margin-top: 10px; }

    /* Sidebar */
    .sidebar {
      width: 240px;
      background: #1a1a20;
      border-right: 1px solid #2a2a32;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
    }
    .sidebar h1 {
      font-size: 15px;
      padding: 20px 16px;
      border-bottom: 1px solid #2a2a32;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .sidebar nav { padding: 12px 0; flex: 1; }
    .sidebar nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 16px;
      color: #999;
      text-decoration: none;
      font-size: 14px;
      transition: 0.15s;
    }
    .sidebar nav a:hover, .sidebar nav a.active { background: #26262e; color: #a78bfa; }
    .sidebar .badge-count {
      margin-left: auto;
      background: #7c3aed;
      color: #fff;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 10px;
    }
    .sidebar .logout-btn {
      margin: 8px 12px;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #333;
      background: transparent;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
    }
    .sidebar .logout-btn:hover { color: #f87171; border-color: #f87171; }

    /* Main */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .main-header {
      padding: 16px 24px;
      border-bottom: 1px solid #2a2a32;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
    }
    .main-header h2 { font-size: 18px; font-weight: 600; }
    .main-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
    }
    .main-body::-webkit-scrollbar { width: 4px; }
    .main-body::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    /* Status badges */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge-attente-de-confirm-tel { background: #1e3a5f; color: #60a5fa; }
    .badge-injoignable { background: #3a2f1e; color: #fbbf24; }
    .badge-annulé { background: #3a1f1f; color: #f87171; }
    .badge-non-qualifié { background: #2a2a32; color: #999; }
    .badge-à-expedier { background: #1e3a2f; color: #4ade80; }
    .badge-livré { background: #1a3a5f; color: #60a5fa; }
    .badge-echouer { background: #3a1f1f; color: #ef4444; }
    .badge-corbeille { background: #2a1f2f; color: #d8b4fe; }

    /* Table */
    .orders-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .orders-toolbar .left,
    .orders-toolbar .right {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .selection-count {
      color: #888;
      font-size: 13px;
    }
    .btn-danger {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #5f2a2a;
      background: #3a1f1f;
      color: #f87171;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
    }
    .btn-danger:hover:not(:disabled) { background: #5f2a2a; color: #fecaca; }
    .btn-danger:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .select-cell {
      width: 42px;
      text-align: center;
    }
    .select-cell input {
      width: 16px;
      height: 16px;
      accent-color: #7c3aed;
      cursor: pointer;
    }
    .table-wrap {
      background: #1a1a20;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 12px 16px;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #666;
      border-bottom: 1px solid #2a2a32;
      background: #16161c;
    }
    td {
      padding: 12px 16px;
      font-size: 14px;
      border-bottom: 1px solid #2a2a32;
    }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #1e1e28; }
    tr { cursor: pointer; }
    .order-id { font-weight: 600; color: #a78bfa; font-size: 12px; }
    .order-date { color: #888; font-size: 12px; }
    .order-client { font-weight: 500; }
    .order-produit { color: #ccc; }
    .order-montant { font-weight: 600; color: #4ade80; }
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    .empty-state i { font-size: 48px; margin-bottom: 16px; color: #333; }

    /* Detail panel */
    .detail-panel {
      background: #1a1a20;
      border: 1px solid #2a2a32;
      border-radius: 12px;
      max-width: 640px;
    }
    .detail-panel .head {
      padding: 20px 24px;
      border-bottom: 1px solid #2a2a32;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .detail-panel .head h3 { font-size: 16px; }
    .detail-panel .body { padding: 20px 24px; }
    .detail-row {
      display: flex;
      padding: 8px 0;
      border-bottom: 1px solid #16161c;
    }
    .detail-row:last-child { border-bottom: none; }
    .detail-label { width: 140px; color: #888; font-size: 13px; flex-shrink: 0; }
    .detail-value { flex: 1; font-size: 14px; word-break: break-word; }

    /* Status tabs (WooCommerce-style) */
    .status-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      background: #16161c;
      border: 1px solid #2a2a32;
      border-radius: 10px;
      padding: 4px;
      overflow-x: auto;
    }
    .status-tab {
      background: transparent;
      border: none;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      padding: 7px 14px;
      border-radius: 8px;
      transition: 0.15s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-tab:hover { color: #ccc; background: #26262e; }
    .status-tab.active { background: #7c3aed; color: #fff; }
    .tab-count {
      background: #26262e;
      color: #999;
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 10px;
      font-weight: 600;
    }
    .status-tab.active .tab-count { background: rgba(255,255,255,0.2); color: #fff; }
    .status-tab:hover .tab-count { background: #333; }

    /* Search */
    .search-input {
      background: #26262e;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 6px 14px;
      color: #e0e0e0;
      font-size: 13px;
      outline: none;
      min-width: 200px;
      transition: 0.15s;
    }
    .search-input:focus { border-color: #7c3aed; }
    .search-input::placeholder { color: #666; }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      margin-top: 16px;
      flex-wrap: wrap;
    }
    .page-btn {
      background: #1a1a20;
      border: 1px solid #2a2a32;
      border-radius: 8px;
      padding: 6px 12px;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
      min-width: 36px;
      text-align: center;
    }
    .page-btn:hover:not(:disabled) { border-color: #7c3aed; color: #a78bfa; }
    .page-btn.active { border-color: #7c3aed; background: #7c3aed; color: #fff; }
    .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-dots { color: #666; font-size: 13px; padding: 0 4px; }
    .page-info { color: #666; font-size: 12px; margin-left: 12px; }

    /* Status update buttons */
    .status-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 16px; }
    .btn-status {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid #333;
      background: transparent;
      color: #ccc;
      font-size: 13px;
      cursor: pointer;
      transition: 0.15s;
    }
    .btn-status:hover { border-color: #7c3aed; color: #a78bfa; }
    .btn-status.active {
      border-color: #7c3aed;
      background: #7c3aed;
      color: #fff;
    }

    .back-btn {
      background: transparent;
      border: 1px solid #333;
      color: #ccc;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
    }
    .back-btn:hover { border-color: #7c3aed; color: #a78bfa; }

    /* Editable fields */
    .edit-field {
      width: 100%;
      background: #26262e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 12px;
      color: #e0e0e0;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      resize: vertical;
    }
    .edit-field:focus { border-color: #7c3aed; }
    .edit-field-sm { min-height: 36px; }
    .detail-row .edit-field { flex: 1; min-width: 0; }
    .save-btn {
      margin-top: 12px;
      padding: 8px 20px;
      border-radius: 8px;
      border: none;
      background: #7c3aed;
      color: #fff;
      font-size: 14px;
      cursor: pointer;
      transition: 0.15s;
    }
    .save-btn:hover { background: #6d28d9; }
    .save-success { color: #4ade80; font-size: 13px; margin-top: 8px; }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar { width: 56px; }
      .sidebar h1 span, .sidebar nav a span, .badge-count { display: none; }
      .sidebar nav a { justify-content: center; padding: 12px; }
      .sidebar .logout-btn span { display: none; }
      .main-header, .main-body { padding: 12px; }
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="loginContainer">
    <div class="login-box">
      <div class="w-14 h-14 rounded-full bg-gradient-to-br from-purple-600 to-violet-400 flex items-center justify-center text-white font-bold text-xl mx-auto">A</div>
      <h2>Administration</h2>
      <p>Connectez-vous pour gérer les commandes</p>
      <input type="password" id="loginPassword" placeholder="Mot de passe" autocomplete="current-password">
      <button id="loginBtn">Se connecter</button>
      <div class="login-error" id="loginError"></div>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="app">
    <aside class="sidebar">
      <h1>
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-purple-600 to-violet-400 flex items-center justify-center text-white font-bold text-sm">A</div>
        <span>Amine Admin</span>
      </h1>
      <nav>
        <a href="#" data-view="orders">
          <i class="fa-solid fa-cart-shopping"></i>
          <span>Commandes</span>
          <span class="badge-count" id="orderCount">0</span>
        </a>
        <a href="#" data-view="products">
          <i class="fa-solid fa-box"></i>
          <span>Produits</span>
        </a>
        <a href="#" data-view="services">
          <i class="fa-solid fa-hand-sparkles"></i>
          <span>Services</span>
        </a>
        <a href="#" data-view="config">
          <i class="fa-solid fa-sliders"></i>
          <span>Configuration</span>
        </a>
        <a href="#" data-view="stats">
          <i class="fa-solid fa-chart-simple"></i>
          <span>Statistiques</span>
        </a>
        <a href="/" target="_blank">
          <i class="fa-solid fa-comment"></i>
          <span>Chat</span>
        </a>
      </nav>
      <button class="logout-btn" id="logoutBtn">
        <i class="fa-solid fa-right-from-bracket"></i> <span>Déconnexion</span>
      </button>
    </aside>

    <div class="main">
      <header class="main-header">
        <h2 id="pageTitle">Commandes</h2>
        <button id="refreshBtn" class="btn-status">
          <i class="fa-solid fa-rotate"></i> Actualiser
        </button>
      </header>
      <div class="main-body" id="mainBody"></div>
    </div>
  </div>

  <script src="admin.js?v=20260602-015"></script>
</body>
</html>
